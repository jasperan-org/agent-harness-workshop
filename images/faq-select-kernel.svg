<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style> .mono { font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; } </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- window -->
  <rect x="0.5" y="0.5" width="919" height="559" rx="12" fill="#1e1e1e" stroke="#000000"/>

  <!-- browser top bar -->
  <path d="M0 12 A12 12 0 0 1 12 0 H908 A12 12 0 0 1 920 12 V36 H0 Z" fill="#2b2b2b"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2e"/>
  <circle cx="62" cy="18" r="6" fill="#28c840"/>
  <rect x="150" y="8" width="620" height="20" rx="10" fill="#1e1e1e"/>
  <text x="166" y="22" class="mono" font-size="11" fill="#9a9a9a">github.com/codespaces/total-recall-9f2c1   ·   Ready</text>

  <!-- VS Code title bar -->
  <rect x="0" y="36" width="920" height="28" fill="#3c3c3c"/>
  <text x="460" y="54" font-size="12" fill="#cfcfcf" text-anchor="middle">Total Recall — Agent Harness Workshop  [Codespaces]</text>

  <!-- activity bar -->
  <rect x="0" y="64" width="48" height="474" fill="#333333"/>
  <rect x="14" y="82" width="20" height="20" rx="3" fill="none" stroke="#cccccc" stroke-width="1.6"/>
  <rect x="14" y="118" width="20" height="16" rx="2" fill="none" stroke="#7a7a7a" stroke-width="1.6"/>

  <!-- editor area -->
  <rect x="48" y="64" width="872" height="474" fill="#1e1e1e"/>
  <!-- notebook tab -->
  <rect x="48" y="64" width="240" height="30" fill="#252526"/>
  <text x="68" y="84" font-size="12" fill="#d7d7d7" class="mono">total_recall_student.ipynb</text>
  <rect x="48" y="92" width="240" height="2" fill="#007acc"/>

  <!-- notebook toolbar with the Select Kernel button (top-right entry point) -->
  <rect x="48" y="94" width="872" height="34" fill="#1e1e1e"/>
  <text x="68" y="115" font-size="12" fill="#9a9a9a">+ Code   + Markdown   |   ▷ Run All   ⟲ Restart   ⌫ Clear All Outputs</text>
  <rect x="724" y="100" width="178" height="22" rx="4" fill="#3a2d2d" stroke="#a1453b"/>
  <circle cx="738" cy="111" r="4" fill="#f48771"/>
  <text x="750" y="115" font-size="11.5" fill="#f0c9c4">Select Kernel</text>
  <text x="612" y="91" font-size="10.5" fill="#6f6f6f" text-anchor="end" class="mono">click here  ↗</text>

  <!-- a cell that won't run without a kernel -->
  <rect x="68" y="146" width="834" height="74" rx="4" fill="#252526"/>
  <rect x="68" y="146" width="6" height="74" fill="#3c3c3c"/>
  <text x="92" y="172" class="mono" font-size="12" fill="#858585">[ ]</text>
  <text x="120" y="172" class="mono" font-size="12" fill="#9cdcfe">import</text>
  <text x="168" y="172" class="mono" font-size="12" fill="#cccccc"> oracledb</text>
  <text x="120" y="196" class="mono" font-size="12" fill="#9cdcfe">from</text>
  <text x="154" y="196" class="mono" font-size="12" fill="#cccccc"> langgraph.graph </text>
  <text x="282" y="196" class="mono" font-size="12" fill="#9cdcfe">import</text>
  <text x="330" y="196" class="mono" font-size="12" fill="#cccccc"> StateGraph</text>

  <!-- ===== Quick-pick dropdown overlay ===== -->
  <g filter="url(#shadow)">
    <rect x="250" y="96" width="430" height="262" rx="6" fill="#252526" stroke="#454545"/>
    <!-- title -->
    <text x="266" y="120" font-size="11.5" fill="#bdbdbd">Select Kernel for "total_recall_student.ipynb"</text>
    <!-- input -->
    <rect x="262" y="130" width="406" height="26" rx="3" fill="#3c3c3c" stroke="#007acc"/>
    <text x="274" y="147" font-size="11.5" fill="#8a8a8a">Type to choose a kernel…</text>

    <!-- Python Environments header -->
    <text x="266" y="178" font-size="10.5" fill="#8a8a8a" letter-spacing="0.6">PYTHON ENVIRONMENTS</text>

    <!-- selected/recommended row -->
    <rect x="256" y="184" width="418" height="34" fill="#094771"/>
    <rect x="256" y="184" width="3" height="34" fill="#2a8af2"/>
    <text x="272" y="198" font-size="12.5" fill="#e2c08d">★</text>
    <text x="288" y="198" font-size="12.5" fill="#ffffff">Python 3.12.13</text>
    <text x="288" y="212" class="mono" font-size="10.5" fill="#bcd6ef">/usr/local/bin/python</text>
    <rect x="566" y="190" width="96" height="18" rx="9" fill="#0e639c"/>
    <text x="614" y="203" font-size="10" fill="#ffffff" text-anchor="middle">Recommended</text>

    <!-- other env row -->
    <text x="288" y="240" font-size="12.5" fill="#dcdcdc">Python 3.11.9</text>
    <text x="288" y="254" class="mono" font-size="10.5" fill="#8a8a8a">/usr/bin/python3</text>

    <!-- divider -->
    <rect x="262" y="270" width="406" height="1" fill="#3a3a3a"/>

    <!-- Jupyter kernel header -->
    <text x="266" y="290" font-size="10.5" fill="#8a8a8a" letter-spacing="0.6">JUPYTER KERNEL</text>
    <!-- the saved-but-missing kernel -->
    <text x="288" y="312" font-size="12.5" fill="#6a6a6a">Python 3 (total_recall)</text>
    <text x="566" y="312" font-size="10.5" fill="#c08a82" text-anchor="start">not installed here</text>

    <!-- footer -->
    <text x="288" y="338" font-size="12" fill="#9cdcfe">Select Another Kernel…</text>
  </g>

  <!-- callout to the recommended row -->
  <path d="M690 200 L712 194 L712 206 Z" fill="#ffd24d"/>
  <rect x="710" y="170" width="196" height="64" rx="6" fill="#fff3cd" stroke="#e0a800"/>
  <text x="722" y="189" font-size="11.5" fill="#664d03" font-weight="bold">Pick this one.</text>
  <text x="722" y="205" font-size="10.7" fill="#664d03">Python 3.12 at /usr/local/bin/</text>
  <text x="722" y="219" font-size="10.7" fill="#664d03">python — where postCreate</text>
  <text x="722" y="233" font-size="10.7" fill="#664d03">installed every dependency.</text>

  <!-- callout to the missing kernel -->
  <rect x="248" y="372" width="424" height="40" rx="6" fill="#3a2d2d" stroke="#a1453b"/>
  <text x="262" y="390" font-size="11" fill="#f0c9c4" font-weight="bold">"Python 3 (total_recall)" is the notebook's saved kernel — a local conda</text>
  <text x="262" y="405" font-size="11" fill="#f0c9c4">env from the author's laptop. It does not exist in your Codespace. Don't wait for it.</text>

  <!-- status bar -->
  <rect x="0" y="538" width="920" height="22" fill="#68217a"/>
  <text x="14" y="553" font-size="11" fill="#ffffff">⚠ Select Kernel to run cells</text>
  <text x="906" y="553" font-size="11" fill="#ffffff" text-anchor="end">Jupyter   ·   No Kernel Selected</text>
</svg>
